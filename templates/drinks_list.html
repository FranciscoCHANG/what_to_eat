<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>測試樣板</title>
<!-- 連結思源中文及css -->
<link href="https://fonts.googleapis.com/css?family=Noto+Sans+TC" rel="stylesheet">
<link href="/static/imgs/icon.jpg" rel="shortcut icon">
<link href="/static/css/menu.css" rel="stylesheet"/>  
<link href="/static/css/main.css" rel="stylesheet"/>      
<!------------------------->
</head>
   
<body>
    <!--**************************-->
    <div class="container">    
        <!--~~~~~~~~~~~~~~~~~-->
        <div class="header">           
        </div>        
        
        <!--~~~~~~~~~~~~~~~~~-->        
        <ul id="navigation">        
            <li><a href="/">返回主頁</a></li> 
        </ul>
        
        <!--~~~~~~~~~~~~~~~~~--> 
        <div class="content">
            <h2>產品清單</h2>

            <p>
                <table>
                    <thead>
                        <tr>
                            <th>產品編號</th>
                            <th>產品名稱</th>
                            <th>單價</th>
                            <th>庫存量</th>
                            <th></th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for d in data %}
                            <tr>
                                <td>{{d[0]}}</td>
                                <td>{{d[1]}}</td>
                                <td>{{d[4]}}</td>
                                <td>{{d[5]}}</td>
                                <td><a href="/product/read?prono={{d[0]}}">詳細</a></td>
                            </tr>
                        {% endfor %}                        
                    </tbody>
                    
                </table>
            </p>       
               
        </div>       
        
        <!--~~~~~~~~~~~~~~~~~--> 
        <div class="footer">
            NTUB imd, 2023.    
        </div>  
    </div>
    <!--**************************-->    
</body>
   
</html>
